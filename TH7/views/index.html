<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trang chủ - HTTP URL FS Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    h1 { font-size: 2rem; margin-bottom: 10px; color: #e94560; }
    p  { color: #a8b2d8; margin-bottom: 32px; font-size: 1rem; }
    .nav { display: flex; gap: 20px; }
    a {
      display: inline-block;
      padding: 14px 36px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: bold;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    a:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.4); }
    .cat-btn { background: #6c63ff; color: #fff; }
    .dog-btn { background: #e94560; color: #fff; }
    .badge {
      margin-top: 40px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 16px 28px;
      color: #a8b2d8;
      font-size: 0.85rem;
    }
    code { color: #64ffda; }
  </style>
</head>
<body>
  <h1>🏠 Trang Chủ</h1>
  <p>Bài 3: HTTP · URL · File System Modules – NodeJS</p>
  <div class="nav">
    <a class="cat-btn" href="/cat.html">🐱 Cat Page</a>
    <a class="dog-btn" href="/dog.html">🐶 Dog Page</a>
  </div>
  <div class="badge">
    Server đang chạy tại <code>http://localhost:8017</code>
  </div>
</body>
</html>
