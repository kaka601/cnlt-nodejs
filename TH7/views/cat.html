<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cat Page</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #6c63ff, #3f3d56);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 36px 48px;
      text-align: center;
      box-shadow: 0 16px 48px rgba(0,0,0,0.35);
      max-width: 420px;
      width: 90%;
    }
    .cat-img {
      width: 200px;
      height: 200px;
      object-fit: cover;
      border-radius: 50%;
      border: 5px solid #e9d5ff;
      box-shadow: 0 6px 24px rgba(108,99,255,0.3);
      margin-bottom: 20px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }
    h3 { color: #2d3748; font-size: 1.8rem; margin-bottom: 14px; }
    ul {
      list-style: none;
      color: #555;
      font-size: 1.05rem;
      line-height: 2;
      margin-bottom: 28px;
    }
    ul li::before { content: "🐾 "; }
    a {
      display: inline-block;
      padding: 12px 28px;
      background: #6c63ff;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      transition: opacity 0.2s;
    }
    a:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="card">
    <img src="/cat.png" alt="Cute cat" class="cat-img">
    <h3>This is cat's page!</h3>
    <ul>
      <li>Ragdoll</li>
      <li>Scottish Fold</li>
      <li>British Shorthair</li>
      <li>Korat Cat</li>
    </ul>
    <a href="/">← Về trang chủ</a>
  </div>
</body>
</html>
